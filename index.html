<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Bucks2Bar</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-ENjdO4Dr2bkBIFxQpeoA6Vj5g4yXiT2M4p2P7FhE6hSG4GmVOm2KQXr3NI5p9xg2" crossorigin="anonymous">
	<link rel="stylesheet" href="css/styles.css">
</head>
<body>
	<div class="container py-4">
		<div class="d-flex flex-column flex-md-row align-items-start justify-content-between mb-4 gap-3">
			<div>
				<h1 class="h3 mb-1">Bucks2Bar</h1>
				<p class="text-muted mb-0">Track monthly income and expenses in USD, then view them in a grouped bar chart.</p>
			</div>
		</div>

		<ul class="nav nav-tabs" id="mainTabs" role="tablist">
			<li class="nav-item" role="presentation">
				<!-- Using data-target instead of data-bs-* to let our script control tabs -->
				<button class="nav-link active" id="data-tab" data-target="#tab-data" type="button" role="tab" aria-controls="tab-data" aria-selected="true">Data</button>
			</li>
			<li class="nav-item" role="presentation">
				<button class="nav-link" id="chart-tab" data-target="#tab-chart" type="button" role="tab" aria-controls="tab-chart" aria-selected="false">Chart</button>
			</li>
		</ul>

		<div class="tab-content py-4" id="mainTabsContent">
			<div class="tab-pane fade show active" id="tab-data" role="tabpanel" aria-labelledby="data-tab">
				<div class="table-responsive">
					<table class="table table-bordered align-middle mb-3">
						<thead class="table-light">
							<tr>
								<th scope="col">Month</th>
								<th scope="col">Income (USD)</th>
								<th scope="col">Expense (USD)</th>
							</tr>
						</thead>
						<tbody id="data-table-body"></tbody>
					</table>
				</div>

				<div class="d-flex flex-wrap gap-2">
					<button id="save-btn" class="btn btn-primary">Save Data</button>
					<button id="reset-btn" class="btn btn-outline-secondary">Reset</button>
					<button id="update-chart-btn" class="btn btn-success ms-auto">Update Chart</button>
				</div>
				<p class="small text-muted mt-2">Your values are stored locally in your browser and displayed in USD.</p>
			</div>

			<div class="tab-pane fade" id="tab-chart" role="tabpanel" aria-labelledby="chart-tab">
				<div class="card shadow-sm">
					<div class="card-body">
						<div class="chart-container">
							<canvas id="income-expense-chart" aria-label="Monthly income and expense chart" role="img"></canvas>
						</div>
						<div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mt-3">
							<span id="chart-note" class="text-muted">The chart updates with the latest data.</span>
							<div class="ms-auto d-flex gap-2 align-items-center">
								<button id="chart-download-btn" class="btn btn-primary btn-sm">Download Chart</button>
								<button id="chart-refresh-btn" class="btn btn-outline-primary btn-sm">Refresh Chart</button>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-QF06kL0YH1dZaEZvgMp2R0Xg5sq89L+G+9nuC/L3pKA1lyeT4z2XrYXnN4m0ZKMW" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<script src="script.js"></script>
</body>
</html>
